<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mathematics - Revision Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    header {
      text-align: center;
      padding: 25px;
      font-size: 26px;
      font-weight: bold;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .box {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .box:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.12);
    }

    h3 {
      margin-bottom: 10px;
      color: #ffcc00;
    }

    a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 8px 0;
      padding: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      transition: 0.3s;
    }

    a:hover {
      background: #ffcc00;
      color: black;
    }

    .back {
      text-align: center;
      margin: 20px;
    }

    .back a {
      display: inline-block;
      padding: 10px 20px;
      background: #ffcc00;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  ➗ Mathematics Revision Center
</header>

<div class="container">

  <!-- NOTES -->
  <div class="box">
    <h3>📘 Notes</h3>
    <a href="files/math_notes_form1.pdf">Form 1 Notes</a>
    <a href="files/math_notes_form2.pdf">Form 2 Notes</a>
    <a href="files/math_notes_form3.pdf">Form 3 Notes</a>
    <a href="files/math_notes_form4.pdf">Form 4 Notes</a>
  </div>

  <!-- PAST PAPERS -->
  <div class="box">
    <h3>📝 Past Papers</h3>
    <a href="files/math_paper1.pdf">Paper 1</a>
    <a href="files/math_paper2.pdf">Paper 2</a>
    <a href="files/math_mock.pdf">Mock Exams</a>
  </div>

  <!-- REVISION MATERIAL -->
  <div class="box">
    <h3>📂 Revision Papers</h3>
    <a href="files/math_revision1.pdf">Revision Set 1</a>
    <a href="files/math_revision2.pdf">Revision Set 2</a>
    <a href="files/math_revision3.pdf">Revision Set 3</a>
  </div>

</div>

<div class="back">
  <a href="subject.html">⬅ Back to Subjects</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="login-box">
        <h2>Create Account ✍️</h2>

        <input type="text" id="signupUsername" placeholder="Create Username">
        <input type="password" id="signupPassword" placeholder="Create Password">

        <button onclick="signup()">Sign Up</button>

        <p class="link">Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>

<script src="auth.js"></script>

</body>
</html>
